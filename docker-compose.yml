name: pishro-auth
services:
  auth-db:
    image: postgres:17
    environment:
      POSTGRES_DB: pishro_auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth_dev_password
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: ./src
      dockerfile: Pishro.Auth.Server/Dockerfile
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      ConnectionStrings__AuthDb: "Host=auth-db;Port=5432;Database=pishro_auth;Username=auth;Password=auth_dev_password"
      # RP ID is the registrable parent domain so the same passkey works
      # at auth.pishro.party (registration), portal.pishro.party (applicant
      # messaging) and erp.pishro.party (admin messaging). Per WebAuthn
      # spec, credentials registered with rpId=pishro.party are usable
      # from any subdomain whose effectiveDomain is a descendant.
      Fido2__ServerDomain: "pishro.party"
      Fido2__Origins__0: "https://auth.pishro.party"
      Fido2__Origins__1: "https://portal.pishro.party"
      Fido2__Origins__2: "https://erp.pishro.party"
    ports:
      - "127.0.0.1:5300:8080"

volumes:
  auth_pgdata:
